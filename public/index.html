<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJOS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="app-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect width="16" height="16" rx="4" fill="#5e6ad2"/>
          <circle cx="8" cy="8" r="3" fill="white"/>
        </svg>
      </div>
      <span class="app-name">AJOS</span>
      <span class="divider">/</span>
      <span class="page-name">Companies</span>
    </div>
    <div class="topbar-right">
      <span id="statusText" class="status-badge">Ready</span>
    </div>
  </header>

  <!-- Search Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="field-group">
        <label for="industry">Industry</label>
        <input type="text" id="industry" placeholder="e.g. Software, Marketing" autocomplete="off"/>
      </div>
      <div class="field-group">
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="e.g. New York, London" autocomplete="off"/>
      </div>
    </div>
    <div class="toolbar-right">
      <button id="nextBtn" class="btn btn-ghost" disabled>Load more</button>
      <button id="searchBtn" class="btn btn-primary">Search</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table id="resultsTable">
      <thead>
        <tr>
          <th class="col-company">Company</th>
          <th class="col-industry">Industry</th>
          <th class="col-address">Address</th>
          <th class="col-website">Website</th>
          <th class="col-contacts">Contacts</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody>
        <!-- rows injected here -->
      </tbody>
    </table>
    <div class="table-empty" id="tableEmpty">
      <p>Enter an industry and location above to find companies.</p>
    </div>
  </div>

  <!-- Email Draft Modal -->
  <div id="emailModal" class="modal-overlay">
    <div class="modal-panel">
      <div class="modal-header">
        <div>
          <p class="modal-label">AI Draft</p>
          <p class="modal-subtitle" id="modalSubtitle">—</p>
        </div>
        <button class="close-btn" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <textarea id="draftTextarea" readonly></textarea>
      <div class="modal-footer">
        <button id="copyBtn" class="btn btn-primary" disabled>Copy to clipboard</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
