<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJOS - Automated Job Opportunity Seeker</title>
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .landing-card {
      max-width: 500px;
      text-align: center;
      padding: 3rem;
    }
    .landing-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .landing-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .landing-logo {
      margin-bottom: 24px;
    }
    .landing-logo svg {
      width: 48px;
      height: 48px;
    }
    .landing-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
  </style>
</head>
<body>

  <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme" data-tooltip="Toggle dark mode">
    <svg class="sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="moon-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>


  <!-- Theme initialization to prevent flash -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark-theme');
    }
  </script>

  <div class="auth-container">
    <div class="auth-card landing-card">
      <div class="landing-logo">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="16" height="16" rx="4" fill="currentColor"/>
          <circle cx="8" cy="8" r="3" fill="var(--bg-color, var(--bg))"/>
        </svg>
      </div>
      <h1 class="landing-title">Welcome to AJOS</h1>
      <p class="landing-subtitle">
        Your automated job opportunity seeker and company lead generation tool. Find the perfect job or client in seconds.
      </p>
      <div class="landing-actions">
        <a href="login.html" class="btn btn-primary" style="text-decoration:none;">Log In</a>
        <a href="register.html" class="btn btn-primary" style="text-decoration:none;">Register</a>
      </div>
      </div>
    </div>
  </div>

  <div style="position:fixed; bottom:1.5rem; width:100%; text-align:center; font-size:0.75rem; color:var(--text-muted);">
    <a href="privacy.html" style="color:var(--text-muted); text-decoration:none; margin:0 0.75rem;">Privacy Policy</a>
    <a href="terms.html" style="color:var(--text-muted); text-decoration:none; margin:0 0.75rem;">Terms of Service</a>
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeToggleBtn');
      if (btn) {
        btn.addEventListener('click', () => {
          const isDark = document.documentElement.classList.toggle('dark-theme');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
      }
    });
  </script>

</body>
</html>
