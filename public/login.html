<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AJOS</title>
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
      }
    }
  </script>
</head>
<body>

  <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme">
    <svg class="sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="moon-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>


  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark-theme');
    }
  </script>

  
  <a href="index.html" class="auth-logo">
    <svg width="24" height="24" viewBox="0 0 16 16" fill="none">
      <rect width="16" height="16" rx="4" fill="currentColor"/>
      <circle cx="8" cy="8" r="3" fill="var(--bg-color, var(--bg))"/>
    </svg>
    AJOS
  </a>

  <div class="auth-container">
    <div style="text-align: left;">
      <a href="index.html" class="policy-back-btn">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path d="M9 1L3 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Home
      </a>
    </div>
    
    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Log in to continue your search</div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn btn-google" id="googleBtn">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
      Continue with Google
    </button>

    <div class="divider">or</div>

    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Type your email" required maxlength="254">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Type your password" required maxlength="128">
      </div>

      <div class="input-group" style="display:flex; align-items:center; margin-bottom: 1.5rem; justify-content: flex-start; flex-direction: row; gap: 0.5rem;">
        <input type="checkbox" id="rememberMe" style="width:auto; margin:0; padding:0; height:auto; cursor:pointer;" checked>
        <label for="rememberMe" style="margin:0; font-size:0.875rem; cursor:pointer;">Remember me</label>
      </div>

      <div class="turnstile-container">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADq8656XmN0AHUrk" data-theme="auto"></div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Log in</button>
    </form>

    <div class="footer-links">
      <div>Don't have an account? <a href="register.html">Sign up</a></div>
      <div style="margin-top:0.5rem;"><a href="forgot-password.html">Forgot your password?</a></div>
    </div>
  </div>
  <script type="module" src="auth.js?v=2"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeToggleBtn');
      if (btn) {
        btn.addEventListener('click', () => {
          const isDark = document.documentElement.classList.toggle('dark-theme');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
      }
    });
  </script>

</body>
</html>
