<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - AJOS</title>
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
      }
    }
  </script>
</head>
<body>

  <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme" data-tooltip="Toggle dark mode">
    <svg class="sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="moon-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>


  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark-theme');
    }
  </script>

  
  <a href="index.html" class="auth-logo">
    <svg width="24" height="24" viewBox="0 0 16 16" fill="none">
      <rect width="16" height="16" rx="4" fill="currentColor"/>
      <circle cx="8" cy="8" r="3" fill="var(--bg-color, var(--bg))"/>
    </svg>
    AJOS
  </a>

  <div class="auth-container" id="mainContainer">
    <div style="text-align: left;">
      <a href="index.html" class="policy-back-btn">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path d="M9 1L3 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Home
      </a>
    </div>
    
    <div class="auth-title">Reset your password</div>
    <div class="auth-subtitle">Enter your email to receive a reset link</div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="forgotForm">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Type your email" required maxlength="254">
      </div>

      <div class="turnstile-container">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADq8656XmN0AHUrk" data-theme="auto"></div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Send reset link</button>
    </form>

    <div class="footer-links">
      <div>Remember your password? <a href="login.html">Log in</a></div>
    </div>
  </div>

  <div class="auth-container" id="successContainer" style="display:none;">
    <div style="display:flex; justify-content:center; margin-bottom:1rem; color: #10b981;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
    </div>
    <div class="auth-title">Check your email!</div>
    <div class="auth-subtitle">If an account exists for that email, we've sent instructions to reset your password. Please kindly check your spam if you couldn't find it in your inbox.</div>
    <button class="btn btn-primary" onclick="window.location.href='login.html'">Back to Login</button>
  </div>
  <script type="module" src="auth.js?v=2"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeToggleBtn');
      if (btn) {
        // Initial setup
        const isDarkInitial = document.documentElement.classList.contains('dark-theme');
        btn.setAttribute('data-tooltip', isDarkInitial ? 'Toggle light mode' : 'Toggle dark mode');

        btn.addEventListener('click', () => {
          const isDarkNow = document.documentElement.classList.toggle('dark-theme');
          localStorage.setItem('theme', isDarkNow ? 'dark' : 'light');
          btn.setAttribute('data-tooltip', isDarkNow ? 'Toggle light mode' : 'Toggle dark mode');
        });
      }
    });
  </script>

</body>
</html>
